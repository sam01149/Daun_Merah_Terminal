name: OHLCV Hourly Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OHLCV sync
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://financial-feed-app.vercel.app/api/admin?action=ohlcv_sync")
          cat /tmp/resp.json
          if [ "$STATUS" -ne 200 ]; then
            echo "Sync failed with HTTP $STATUS"
            exit 1
          fi
