name: TA Cache Warm

on:
  # Schedule dimatikan 2026-07-20 — terbukti redundant: ohlcvSyncHandler
  # (api/admin.js, ~baris 1675-1686) sudah warm ta:<symbol>:1d untuk PERSIS
  # 8 pair yang sama (OHLCV_FIXED_PAIRS) setiap kali ohlcv_sync jalan (GH Actions
  # ohlcv-sync.yml tiap jam + Railway daemon Q-6). workflow_dispatch tetap ada
  # untuk reaktivasi manual kalau suatu saat ohlcv_sync kehilangan sub-langkah
  # TA-warm-nya. Lihat Dokumentasi/daun_merah.md Session 205 (Plan V-1).
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm TA cache for all tracked pairs
        run: |
          SYMBOLS=("GC=F" "EURUSD=X" "GBPUSD=X" "USDJPY=X" "AUDUSD=X" "USDCAD=X" "USDCHF=X" "NZDUSD=X")
          FAILED=0
          for SYMBOL in "${SYMBOLS[@]}"; do
            STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              "https://financial-feed-app.vercel.app/api/correlations?action=ta&symbol=$SYMBOL&interval=1d")
            echo "=== $SYMBOL -> HTTP $STATUS ==="
            cat /tmp/resp.json
            if [ "$STATUS" -ne 200 ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more TA warm requests failed"
            exit 1
          fi
