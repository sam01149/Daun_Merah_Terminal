name: Market Digest Session-Open Runs

# Dipindah dari vercel.json cron ke sini (session 141) — Vercel Hobby plan tidak
# terjamin menjalankan >1 cron/hari secara konsisten (lihat catatan [VERIFY] di
# daun_merah.md), sama seperti OHLCV sync yang sudah lebih dulu dipindah kesini.
# 3 jadwal ini match waktu buka sesi: Asia/Eropa/New York.
on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 07:00 WIB — sesi Asia
    - cron: '0 7 * * *'   # 07:00 UTC = 14:00 WIB — sesi Eropa/London
    - cron: '30 12 * * *' # 12:30 UTC = 19:30 WIB — sesi New York
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market digest generation
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 55 \
            "https://financial-feed-app.vercel.app/api/market-digest")
          cat /tmp/resp.json
          if [ "$STATUS" -ne 200 ]; then
            echo "Digest generation failed with HTTP $STATUS"
            exit 1
          fi

      # Runs after the digest step (not parallel) so it can pick up the freshly
      # cached article for macro context (see the "XAUUSD:" excerpt fallback in
      # ohlcvAnalyzeHandler, api/admin.js). if: always() so a digest hiccup doesn't
      # also block this — it just falls back to technical-only context.
      - name: Trigger XAU/USD ANALISA generation
        if: always()
        run: |
          STATUS=$(curl -s -o /tmp/resp2.json -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 55 \
            "https://financial-feed-app.vercel.app/api/admin?action=ohlcv_analyze&symbol=GC%3DF&label=XAU%2FUSD")
          cat /tmp/resp2.json
          if [ "$STATUS" -ne 200 ]; then
            echo "XAU/USD analysis failed with HTTP $STATUS"
            exit 1
          fi
