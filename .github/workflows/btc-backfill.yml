name: BTC Data Backfill (one-off)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run backfill
        run: node scripts/btc-backfill.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc/
          git diff --cached --quiet || git commit -m "data: BTC historical backfill (OHLCV, funding rate, open interest, fear&greed)"
          git push
