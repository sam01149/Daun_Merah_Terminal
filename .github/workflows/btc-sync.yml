name: BTC Data Sync

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run sync
        run: node scripts/btc-sync.js

      - name: Rebuild feature matrix
        run: node scripts/feature-engineering.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc/
          if git diff --cached --quiet; then
            echo "No new data, skipping commit."
          else
            git commit -m "data: BTC incremental sync"
            git push
          fi
